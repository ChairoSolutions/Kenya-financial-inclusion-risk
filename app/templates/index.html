<!DOCTYPE html>
<html>
<head>
    <title>Financial Exclusion Risk Predictor</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 500px;
            margin: auto;
        }

        h1 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e9f5ff;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Financial Exclusion Predictor</h1>

    <form method="POST" action="/predict_form">

        <label>Gender</label>
        <select name="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label>Settlement Type</label>
        <select name="settlement_type">
            <option value="Urban">Urban</option>
            <option value="Rural">Rural</option>
        </select>

        <label>Education Level</label>
        <select name="education_level">
            <option value="Primary">Primary</option>
            <option value="Secondary">Secondary</option>
            <option value="Tertiary">Tertiary</option>
        </select>

        <label>Employment Status</label>
        <select name="employment_status">
            <option value="Employed">Employed</option>
            <option value="Unemployed">Unemployed</option>
        </select>

        <button type="submit">Predict Risk</button>

    </form>

    {% if result %}

    <div class="result">

        <h3>Prediction Result</h3>

        <p><strong>Status:</strong> {{ result.prediction_label }}</p>

        <p><strong>Exclusion Probability:</strong> {{ result.exclusion_percentage }}</p>

        <p><strong>Risk Tier:</strong> {{ result.risk_tier }}</p>

    </div>

    {% endif %}

</div>

</body>
</html>
